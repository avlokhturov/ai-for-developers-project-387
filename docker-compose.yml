version: "3.8"

services:
  api:
    build:
      context: ./backend
      network: host
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  mock-api:
    image: stoplight/prism:latest
    command: mock -h 0.0.0.0 /openapi.yaml
    volumes:
      - ./generated/@typespec/openapi3/openapi.yaml:/openapi.yaml:ro
    ports:
      - "4010:4010"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
