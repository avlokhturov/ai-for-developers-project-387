version: "3.8"

services:
  api:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
