openapi: 3.0.0
info:
  title: (title)
  version: 0.0.0
tags: []
paths:
  /api/bookings:
    get:
      operationId: Bookings_list
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: to
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  - $ref: '#/components/schemas/Error'
    post:
      operationId: Bookings_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Booking'
                  - $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
  /api/bookings/{id}:
    get:
      operationId: Bookings_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/Booking'
                  - $ref: '#/components/schemas/Error'
    delete:
      operationId: Bookings_cancel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/event-types:
    get:
      operationId: EventTypes_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/EventType'
                  - $ref: '#/components/schemas/Error'
    post:
      operationId: EventTypes_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/EventType'
                  - $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypeCreate'
  /api/event-types/{id}:
    get:
      operationId: EventTypes_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/EventType'
                  - $ref: '#/components/schemas/Error'
    put:
      operationId: EventTypes_update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/EventType'
                  - $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventTypeCreate'
    delete:
      operationId: EventTypes_delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
  /api/slots:
    get:
      operationId: Slots_getAvailable
      parameters:
        - name: eventTypeId
          in: query
          required: true
          schema:
            type: string
          explode: false
        - name: date
          in: query
          required: true
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/SlotsResponse'
                  - $ref: '#/components/schemas/Error'
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - guestName
        - guestEmail
        - startTime
        - endTime
        - status
        - createdAt
      properties:
        id:
          type: string
        eventTypeId:
          type: string
        guestName:
          type: string
        guestEmail:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        status:
          type: string
          enum:
            - confirmed
            - cancelled
        createdAt:
          type: string
    BookingCreate:
      type: object
      required:
        - eventTypeId
        - guestName
        - guestEmail
        - startTime
      properties:
        eventTypeId:
          type: string
        guestName:
          type: string
        guestEmail:
          type: string
        startTime:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    EventType:
      type: object
      required:
        - id
        - name
        - description
        - duration
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        duration:
          type: integer
          format: int32
        createdAt:
          type: string
        updatedAt:
          type: string
    EventTypeCreate:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        duration:
          type: integer
          format: int32
          default: 30
    Slot:
      type: object
      required:
        - start
        - end
        - available
      properties:
        start:
          type: string
        end:
          type: string
        available:
          type: boolean
    SlotsResponse:
      type: object
      required:
        - date
        - eventTypeId
        - slots
      properties:
        date:
          type: string
        eventTypeId:
          type: string
        slots:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
servers:
  - url: http://localhost:8080
    description: Go backend server
    variables: {}
