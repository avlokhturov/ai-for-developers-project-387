name: lighthouse-audit

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:4010

      - name: Start mock API
        run: npx prism mock ../generated/@typespec/openapi3/openapi.yaml --port 4010 &
        working-directory: frontend

      - name: Start preview server
        run: npx vite preview --port 3000 --host &
        working-directory: frontend

      - name: Wait for servers
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          mkdir -p lighthouse-reports
          lighthouse http://localhost:3000 \
            --output html \
            --output json \
            --output-path ./lighthouse-reports/report \
            --chrome-flags="--headless --no-sandbox" \
            --quiet

      - name: Generate summary
        run: |
          node -e "
            const report = require('./lighthouse-reports/report.json');
            const categories = report.categories;
            const scores = {
              performance: Math.round(categories.performance.score * 100),
              accessibility: Math.round(categories.accessibility.score * 100),
              'best-practices': Math.round(categories['best-practices'].score * 100),
              seo: Math.round(categories.seo.score * 100),
            };
            require('fs').writeFileSync('lighthouse-reports/scores.json', JSON.stringify(scores, null, 2));

            const emoji = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';
            const date = new Date().toISOString().split('T')[0];
            const md = [
              '## Lighthouse Report — ' + date,
              '',
              '| Category | Score |',
              '|----------|-------|',
              ...Object.entries(scores).map(([k, v]) => '| ' + k + ' | ' + emoji(v) + ' ' + v + '/100 |'),
              '',
              'Full HTML report available in workflow artifacts.',
              '',
              '### Recommendations',
              '',
            ];

            const audits = report.categories;
            const failedAudits = [];
            for (const [, cat] of Object.entries(audits)) {
              for (const ref of cat.auditRefs) {
                const audit = report.audits[ref.id];
                if (audit.score !== null && audit.score < 0.9 && audit.score > 0) {
                  failedAudits.push('- **' + audit.title + '** (' + cat.id + '): ' + (audit.description || ''));
                }
              }
            }

            if (failedAudits.length > 0) {
              md.push(...failedAudits.slice(0, 10));
              if (failedAudits.length > 10) {
                md.push('', '... and ' + (failedAudits.length - 10) + ' more issues.');
              }
            } else {
              md.push('All checks passed!');
            }

            require('fs').writeFileSync('lighthouse-reports/summary.md', md.join('\n'));
            console.log(md.join('\n'));
          "

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_number }}
          path: lighthouse-reports/
          retention-days: 30

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('lighthouse-reports/summary.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            const title = 'Lighthouse Audit Report';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'lighthouse',
              state: 'open'
            });

            const body = summary + '\n\n---\n_Auto-generated by scheduled Lighthouse audit._';

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['lighthouse']
              });
            }
